<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Git Viewer</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/diff2html/bundles/css/diff2html.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>

<div class="header">
  <select id="fav-select" onchange="jumpToFavorite(this.value); this.value='';">
    <option value="">&#9733; Favorites</option>
  </select>
  <div class="header-controls">
    <select id="repo-select"></select>
    <button id="btn-refresh" onclick="refresh()">↻</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="overview" onclick="switchTab('overview')">概要</div>
  <div class="tab" data-tab="log" onclick="switchTab('log')">ログ</div>
  <div class="tab" data-tab="diff" onclick="switchTab('diff')">差分</div>
  <div class="tab" data-tab="files" onclick="switchTab('files')">ファイル</div>
</div>

<div class="content" id="content"></div>

<script src="https://cdn.jsdelivr.net/npm/diff2html/bundles/js/diff2html.min.js"></script>
<script>
const ICON_FOLDER = `<svg width="14" height="12" viewBox="0 0 16 14" fill="none" style="vertical-align:-2px;"><path d="M1 2C1 1.45 1.45 1 2 1H6L8 3H14C14.55 3 15 3.45 15 4V12C15 12.55 14.55 13 14 13H2C1.45 13 1 12.55 1 12V2Z" fill="#e8a735" stroke="#c4891e" stroke-width=".5"/><path d="M1 5H15V12C15 12.55 14.55 13 14 13H2C1.45 13 1 12.55 1 12V5Z" fill="#f0c04a"/></svg>`;
const ICON_FOLDER_OPEN = `<svg width="14" height="12" viewBox="0 0 16 14" fill="none" style="vertical-align:-2px;"><path d="M1 2C1 1.45 1.45 1 2 1H6L8 3H14C14.55 3 15 3.45 15 4V5H3L0 12V2C0 1.45 .45 1 1 1Z" fill="#e8a735" stroke="#c4891e" stroke-width=".5"/><path d="M0 12L3 5H15L12 12H0Z" fill="#f0c04a" stroke="#c4891e" stroke-width=".5"/></svg>`;
const ICON_FILE = `<svg width="12" height="14" viewBox="0 0 12 14" fill="none" style="vertical-align:-2px;"><path d="M1 1H7L11 5V13H1V1Z" fill="#2d333b" stroke="#545d68" stroke-width=".7"/><path d="M7 1L11 5H7V1Z" fill="#3d444d"/><line x1="3" y1="7" x2="9" y2="7" stroke="#545d68" stroke-width=".5"/><line x1="3" y1="9" x2="9" y2="9" stroke="#545d68" stroke-width=".5"/><line x1="3" y1="11" x2="7" y2="11" stroke="#545d68" stroke-width=".5"/></svg>`;
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const content = $('#content');
const repoSelect = $('#repo-select');
const favSelect = $('#fav-select');

let repos = [];
let currentRepo = '';
let currentTab = 'overview';
let logData = [];
let diffFormat = 'line-by-line';
let favorites = [];

// --- State persistence ---
const STATE_KEY = 'gitviewer_state';
function saveState() {
  localStorage.setItem(STATE_KEY, JSON.stringify({
    repo: currentRepo,
    tab: currentTab,
    path: currentPath,
  }));
}
function loadState() {
  try { return JSON.parse(localStorage.getItem(STATE_KEY)) || {}; } catch { return {}; }
}

// --- Init ---
function buildRepoOptions(repoList) {
  const uncategorized = repoList.filter(r => !r.category);
  const categories = {};
  for (const r of repoList) {
    if (r.category) {
      if (!categories[r.category]) categories[r.category] = [];
      categories[r.category].push(r);
    }
  }
  let html = uncategorized.map(r =>
    `<option value="${r.name}">${r.name}</option>`
  ).join('');
  for (const cat of Object.keys(categories).sort()) {
    html += `<optgroup label="${cat}">`;
    html += categories[cat].map(r =>
      `<option value="${r.name}">${r.name.split('/').pop()}</option>`
    ).join('');
    html += `</optgroup>`;
  }
  return html;
}

function buildFavOptions() {
  let html = '<option value="">&#9733; Favorites</option>';
  for (const fav of favorites) {
    let label = fav;
    for (const r of repos) {
      if (fav.startsWith(r.name + '/')) {
        const dirPath = fav.substring(r.name.length + 1);
        label = r.name + ' / ' + dirPath;
        break;
      }
      if (fav === r.name) {
        label = r.name;
        break;
      }
    }
    html += `<option value="${esc(fav)}">${esc(label)}</option>`;
  }
  favSelect.innerHTML = html;
}

function jumpToFavorite(fav) {
  if (!fav) return;
  for (const r of repos) {
    if (fav.startsWith(r.name + '/') || fav === r.name) {
      const dirPath = fav.startsWith(r.name + '/') ? fav.substring(r.name.length + 1) : '';
      currentRepo = r.name;
      repoSelect.value = currentRepo;
      currentTab = 'files';
      $$('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === 'files'));
      renderFiles(dirPath);
      return;
    }
  }
}

async function init() {
  repos = await fetchJson('/api/repos');
  favorites = await fetchJson('/api/favorites');
  repoSelect.innerHTML = buildRepoOptions(repos);
  buildFavOptions();

  const saved = loadState();
  const repoNames = repos.map(r => r.name);
  if (saved.repo && repoNames.includes(saved.repo)) {
    currentRepo = saved.repo;
  } else if (repos.length > 0) {
    currentRepo = repos[0].name;
  }
  repoSelect.value = currentRepo;

  if (saved.tab && ['overview','log','diff','files'].includes(saved.tab)) {
    currentTab = saved.tab;
    $$('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === currentTab));
  }
  if (saved.path) currentPath = saved.path;

  repoSelect.onchange = () => { currentRepo = repoSelect.value; currentPath = ''; saveState(); renderTab(); };
  renderTab();
}

async function refresh() {
  repos = await fetchJson('/api/repos');
  repoSelect.innerHTML = buildRepoOptions(repos);
  const repoNames = repos.map(r => r.name);
  if (!repoNames.includes(currentRepo) && repos.length > 0) {
    currentRepo = repos[0].name;
  }
  repoSelect.value = currentRepo;
  saveState();
  renderTab();
}

async function fetchJson(url) {
  try {
    const r = await fetch(url);
    if (!r.ok) return [];
    return await r.json();
  } catch { return []; }
}

// --- Tabs ---
function switchTab(tab) {
  currentTab = tab;
  if (tab !== 'files') currentPath = '';
  $$('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  saveState();
  renderTab();
}

async function renderTab() {
  if (!currentRepo) { content.innerHTML = '<div class="diff-empty">リポジトリがありません</div>'; return; }
  if (currentTab === 'overview') await renderOverview();
  else if (currentTab === 'log') await renderLog();
  else if (currentTab === 'diff') await renderDiff();
  else if (currentTab === 'files') await renderFiles();
}

// --- Overview ---
async function renderOverview() {
  const info = repos.find(r => r.name === currentRepo);
  if (!info) return;

  const [logs, diffData, branchData] = await Promise.all([
    fetchJson(`/api/log?repo=${currentRepo}&limit=5`),
    fetchJson(`/api/diff?repo=${currentRepo}`),
    fetchJson(`/api/branches?repo=${currentRepo}`),
  ]);
  const files = diffData.files || [];
  const branches = branchData || [];

  content.innerHTML = `
    <div class="status-bar">
      <span><span class="label">branch:</span> <span class="val-branch">${info.branch}</span></span>
      <span><span class="label">changes:</span> <span class="val-changes">${info.changes} files</span></span>
      <span><span class="label">latest:</span> <span class="val-time">${timeAgo(info.latest_time)}</span></span>
      <span><span class="label">remote:</span> <span class="val-remote">${info.remote_status}</span></span>
    </div>
    ${branches.length > 1 ? `
      <div class="section-header">branches</div>
      <div class="list-box">${branches.map(b => `
        <div class="list-row${b.current ? ' branch-current' : ''}">
          <span class="branch-icon">${b.current ? '●' : '○'}</span>
          <span class="branch-name">${esc(b.name)}</span>
          <span class="commit-hash">${b.hash}</span>
          ${b.upstream ? `<span class="commit-time">${esc(b.upstream)}</span>` : ''}
        </div>
      `).join('')}</div>
    ` : ''}
    ${files.length > 0 ? `
      <div class="section-header">changes</div>
      <div class="list-box">${files.map((f, i) => `
        <div class="list-row clickable" onclick="toggleFileDiff(this, '${esc(f)}', 'ov-diff-${i}')">
          <span class="badge-m">M</span><span>${esc(f)}</span>
        </div>
        <div class="diff-inline" id="ov-diff-${i}" style="display:none;"></div>
      `).join('')}</div>
    ` : ''}
    <div class="section-header">recent commits</div>
    <div class="list-box">${logs.map(c => `
      <div class="list-row">
        <span class="commit-hash">${c.hash}</span>
        <span class="commit-msg">${esc(c.message)}</span>
        <span class="commit-time">${timeAgo(c.time)}</span>
      </div>
    `).join('')}</div>
  `;
}

// --- Log ---
async function renderLog() {
  logData = await fetchJson(`/api/log?repo=${currentRepo}&limit=50`);

  content.innerHTML = `
    <div class="list-box">${logData.map((c, i) => `
      <div class="list-row clickable" onclick="toggleCommitDiff(this, '${c.hash}', ${i})">
        <span class="commit-hash">${c.hash}</span>
        <span class="commit-msg">${esc(c.message)}</span>
        <span class="commit-stat">${c.files_changed > 0 ? `${c.files_changed}f <span class="stat-add">+${c.insertions}</span> <span class="stat-del">-${c.deletions}</span>` : ''}</span>
        <span class="commit-time">${timeAgo(c.time)}</span>
      </div>
      <div class="diff-inline" id="diff-${i}" style="display:none;"></div>
    `).join('')}</div>
  `;
}

async function toggleCommitDiff(row, hash, idx) {
  const el = document.getElementById(`diff-${idx}`);
  if (el.style.display !== 'none') {
    el.style.display = 'none';
    return;
  }
  el.innerHTML = '<div style="padding:4px 8px;color:var(--text-muted);">Loading...</div>';
  el.style.display = 'block';

  const data = await fetchJson(`/api/diff?repo=${currentRepo}&commit=${hash}`);
  if (data.diff) {
    el.innerHTML = `<div class="diff-toolbar"><button class="diff-toggle" onclick="event.stopPropagation(); toggleDiffFormat(this, '${hash}', ${idx})">⇄ ${diffFormat === 'line-by-line' ? 'side-by-side' : 'line-by-line'}</button></div><div class="diff-container">${renderDiffHtml(data.diff)}</div>`;
  } else {
    el.innerHTML = '<div class="diff-empty">差分なし</div>';
  }
}

async function toggleDiffFormat(btn, hash, idx) {
  diffFormat = diffFormat === 'line-by-line' ? 'side-by-side' : 'line-by-line';
  const el = document.getElementById(`diff-${idx}`);
  const data = await fetchJson(`/api/diff?repo=${currentRepo}&commit=${hash}`);
  if (data.diff) {
    el.innerHTML = `<div class="diff-toolbar"><button class="diff-toggle" onclick="event.stopPropagation(); toggleDiffFormat(this, '${hash}', ${idx})">⇄ ${diffFormat === 'line-by-line' ? 'side-by-side' : 'line-by-line'}</button></div><div class="diff-container">${renderDiffHtml(data.diff)}</div>`;
  }
}

function toggleWorkingDiffFormat() {
  diffFormat = diffFormat === 'line-by-line' ? 'side-by-side' : 'line-by-line';
  renderDiff();
}

// --- Diff (working tree) ---
async function renderDiff() {
  const data = await fetchJson(`/api/diff?repo=${currentRepo}`);

  if (!data.diff) {
    content.innerHTML = '<div class="diff-empty">未コミットの変更はありません</div>';
    return;
  }

  content.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <div class="section-header" style="margin:0;">uncommitted changes (${(data.files || []).length} files)</div>
      <button class="diff-toggle" onclick="toggleWorkingDiffFormat()">⇄ ${diffFormat === 'line-by-line' ? 'side-by-side' : 'line-by-line'}</button>
    </div>
    <div class="diff-container">${renderDiffHtml(data.diff)}</div>
  `;
}

// --- File diff toggle (overview changes) ---
async function toggleFileDiff(row, filePath, elId) {
  const el = document.getElementById(elId);
  if (el.style.display !== 'none') {
    el.style.display = 'none';
    return;
  }
  el.innerHTML = '<div style="padding:4px 8px;color:var(--text-muted);">Loading...</div>';
  el.style.display = 'block';

  const data = await fetchJson(`/api/diff?repo=${currentRepo}&file=${encodeURIComponent(filePath)}`);
  if (data.diff) {
    el.innerHTML = `<div class="diff-container">${renderDiffHtml(data.diff)}</div>`;
  } else {
    el.innerHTML = '<div class="diff-empty">差分なし</div>';
  }
}

// --- Files tab ---
let currentPath = '';

async function renderFiles(path) {
  if (path !== undefined) currentPath = path;
  saveState();
  const entries = await fetchJson(`/api/tree?repo=${currentRepo}&path=${encodeURIComponent(currentPath)}`);

  const breadcrumb = buildBreadcrumb(currentPath);

  content.innerHTML = `
    <div class="section-header" style="display:flex;align-items:center;gap:4px;">
      ${breadcrumb}
    </div>
    <div class="list-box">
      ${currentPath ? `<div class="list-row clickable" onclick="renderFiles('${parentPath(currentPath)}')"><span class="tree-icon">${ICON_FOLDER_OPEN}</span><span>..</span></div>` : ''}
      ${(entries || []).map(e => e.type === 'tree'
        ? `<div class="list-row clickable" onclick="renderFiles('${esc(e.path)}')"><span class="tree-icon">${ICON_FOLDER}</span><span>${esc(e.name)}</span></div>`
        : `<div class="list-row clickable" onclick="showBlob('${esc(e.path)}')"><span class="tree-icon">${ICON_FILE}</span><span>${esc(e.name)}</span></div>`
      ).join('')}
    </div>
    <div id="blob-view"></div>
  `;
}

function buildBreadcrumb(path) {
  let html = `<span class="clickable" onclick="renderFiles('')" style="cursor:pointer;color:var(--accent);">${currentRepo}</span>`;
  if (path) {
    const parts = path.split('/');
    let acc = '';
    for (const p of parts) {
      acc = acc ? acc + '/' + p : p;
      html += ` / <span class="clickable" onclick="renderFiles('${acc}')" style="cursor:pointer;color:var(--accent);">${esc(p)}</span>`;
    }
  }
  return html;
}

function parentPath(path) {
  const i = path.lastIndexOf('/');
  return i > 0 ? path.substring(0, i) : '';
}

const IMAGE_EXTS = ['jpg','jpeg','png','gif','svg','webp','ico'];
const PDF_EXTS = ['pdf'];
const TEXT_EXTS = [
  'py','js','ts','jsx','tsx','sh','bash','json','yml','yaml','xml','html','css',
  'toml','md','txt','cfg','ini','conf','env','service','timer','csv','sql',
  'rb','go','rs','java','c','h','cpp','hpp','vue','svelte','gitignore',
  'dockerignore','makefile','lock','log',
];
const LANG_MAP = {
  '.py':'python', '.js':'javascript', '.ts':'typescript', '.jsx':'javascript',
  '.tsx':'typescript', '.sh':'bash', '.bash':'bash', '.json':'json',
  '.yml':'yaml', '.yaml':'yaml', '.xml':'xml', '.html':'html', '.css':'css',
  '.toml':'toml', '.rb':'ruby', '.go':'go', '.rs':'rust', '.java':'java',
  '.c':'c', '.h':'c', '.cpp':'cpp', '.hpp':'cpp', '.sql':'sql',
  '.vue':'html', '.svelte':'html',
};

async function showBlob(path) {
  const blobView = document.getElementById('blob-view');
  if (!blobView) return;
  blobView.innerHTML = '<div style="padding:4px 8px;color:var(--text-muted);">Loading...</div>';

  const ext = path.includes('.') ? path.split('.').pop().toLowerCase() : '';
  const blobUrl = `/api/blob?repo=${currentRepo}&path=${encodeURIComponent(path)}`;
  const fileName = path.split('/').pop();

  // Binary files — show download link only
  if (!IMAGE_EXTS.includes(ext) && !PDF_EXTS.includes(ext) && !TEXT_EXTS.includes(ext) && ext !== '') {
    blobView.innerHTML = `
      <div class="section-header" style="margin-top:8px;">${esc(path)}</div>
      <div class="diff-empty">バイナリファイル — <a href="${blobUrl}" download style="color:var(--accent);">ダウンロード</a></div>`;
    return;
  }

  // Images
  if (IMAGE_EXTS.includes(ext)) {
    blobView.innerHTML = `
      <div class="section-header" style="margin-top:8px;">${esc(path)}</div>
      <div class="blob-container" style="text-align:center;padding:8px;">
        <img src="${blobUrl}" alt="${esc(fileName)}" style="max-width:100%;height:auto;">
      </div>`;
    return;
  }

  // PDF
  if (PDF_EXTS.includes(ext)) {
    blobView.innerHTML = `
      <div class="section-header" style="margin-top:8px;">${esc(path)}
        <a href="${blobUrl}" target="_blank" rel="noopener" style="margin-left:8px;color:var(--accent);font-size:11px;">新しいタブで開く</a>
      </div>
      <iframe src="${blobUrl}" style="width:100%;height:70vh;border:1px solid #21262d;border-radius:4px;"></iframe>`;
    return;
  }

  // Text / Code / Markdown
  const data = await fetchJson(blobUrl);
  if (data.content === undefined) {
    blobView.innerHTML = '<div class="diff-empty">ファイルを表示できません</div>';
    return;
  }

  const fileExt = data.ext || '';
  if (fileExt === '.md') {
    blobView.innerHTML = `
      <div class="section-header" style="margin-top:8px;">${esc(path)}<button class="btn-edit" onclick="editBlob('${esc(path)}')">編集</button></div>
      <div class="blob-container markdown-body" style="padding:12px;">${marked.parse(data.content)}</div>`;
    blobView.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
  } else {
    const lang = LANG_MAP[fileExt] || 'plaintext';
    const escaped = data.content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    blobView.innerHTML = `
      <div class="section-header" style="margin-top:8px;">${esc(path)}<button class="btn-edit" onclick="editBlob('${esc(path)}')">編集</button></div>
      <div class="blob-container"><pre class="blob-content"><code class="language-${lang}">${escaped}</code></pre></div>`;
    blobView.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
  }
}

let editingPath = '';
let editingOriginal = '';

async function editBlob(path) {
  const blobView = document.getElementById('blob-view');
  if (!blobView) return;

  editingPath = path;
  const blobUrl = `/api/blob?repo=${currentRepo}&path=${encodeURIComponent(path)}`;
  const data = await fetchJson(blobUrl);
  if (data.content === undefined) {
    blobView.innerHTML = '<div class="diff-empty">ファイルを編集できません</div>';
    return;
  }

  editingOriginal = data.content;
  const escaped = data.content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  blobView.innerHTML = `
    <div class="section-header" style="margin-top:8px;">${esc(path)}
      <span style="margin-left:8px;color:var(--text-muted);font-size:11px;">編集中</span>
    </div>
    <div class="blob-container">
      <textarea id="edit-textarea" class="edit-textarea" spellcheck="false">${escaped}</textarea>
      <div class="edit-controls">
        <button class="btn-cancel" onclick="showBlob('${esc(editingPath)}')">キャンセル</button>
        <button class="btn-save" onclick="saveBlob()">保存</button>
      </div>
    </div>`;

  const ta = document.getElementById('edit-textarea');
  ta.style.height = Math.max(200, ta.scrollHeight) + 'px';
}

async function saveBlob() {
  const ta = document.getElementById('edit-textarea');
  if (!ta) return;

  const res = await fetch('/api/blob', {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({repo: currentRepo, path: editingPath, content: ta.value}),
  });

  if (res.ok) {
    showBlob(editingPath);
  } else {
    alert('保存に失敗しました');
  }
}

// --- Helpers ---
function renderDiffHtml(diffText) {
  try {
    return Diff2Html.html(diffText, {
      drawFileList: false,
      matching: 'lines',
      outputFormat: diffFormat,
      diffStyle: 'word',
      colorScheme: 'dark',
    });
  } catch {
    return `<pre style="padding:8px;color:var(--text);white-space:pre-wrap;">${esc(diffText)}</pre>`;
  }
}

function timeAgo(isoStr) {
  if (!isoStr) return '';
  const diff = Date.now() - new Date(isoStr).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'now';
  if (m < 60) return m + 'm';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h';
  const d = Math.floor(h / 24);
  return d + 'd';
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

init();
</script>

</body>
</html>
